<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZTMY LEAKS Monitor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #e0e0e8;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 9999px;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      color: #22c55e;
      margin-bottom: 1.5rem;
    }
    .pulse {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #a78bfa, #818cf8, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }
    p {
      color: #9ca3af;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    a { color: #818cf8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .info {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="status-badge"><div class="pulse"></div>Monitoring Active</div>
    <h1>ZTMY LEAKS Monitor</h1>
    <p>
      <a href="http://ihihi.me/" target="_blank" rel="noopener">ihihi.me</a> を15分おきに監視中。<br>
      新しい投稿が見つかると自動的にXへポストします。
    </p>
    <p class="info">Powered by Netlify Scheduled Functions</p>
  </div>
</body>
</html>
